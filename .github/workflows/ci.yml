name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  agente:
    name: Agente — testes unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: agente/package-lock.json

      - name: Install
        working-directory: agente
        run: npm ci

      - name: Test
        working-directory: agente
        run: npm test -- --forceExit

  next:
    name: Next — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
